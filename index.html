<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire & Safety Audit Tool — NBC & IS Standards</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF3B00;
    --fire-dim: #C42D00;
    --amber: #FF8C00;
    --gold: #FFB700;
    --safe: #00C48C;
    --warn: #FFB700;
    --danger: #FF3B00;
    --na: #6B7280;
    --bg: #0A0C0F;
    --bg2: #111318;
    --bg3: #181B22;
    --bg4: #1E2229;
    --border: #2A2F3A;
    --border-bright: #3A4050;
    --text: #E8EAF0;
    --text-dim: #8B90A0;
    --text-muted: #4A5060;
    --accent: #FF3B00;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 64px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #FF3B00, #FF8C00);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .logo-sub {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  header nav {
    display: flex;
    gap: 4px;
    margin-left: auto;
    align-items: center;
  }
  .nav-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.active { background: var(--bg3); color: var(--text); }
  .btn-primary {
    background: linear-gradient(135deg, #FF3B00, #FF6B35);
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,59,0,0.35); }
  .btn-secondary {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--border-bright); background: var(--bg4); }

  /* ── LAYOUT ── */
  .app-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 64px);
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
  }
  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding: 0 4px;
  }
  .progress-ring-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 4px;
  }
  .score-circle {
    width: 72px; height: 72px;
    flex-shrink: 0;
    position: relative;
  }
  .score-circle svg { transform: rotate(-90deg); }
  .score-circle .score-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text);
    line-height: 1;
  }
  .score-circle .score-sub { font-size: 9px; font-family: 'DM Sans', sans-serif; color: var(--text-muted); }
  .score-stats { flex: 1; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
  .stat-label { font-size: 12px; color: var(--text-dim); }
  .stat-val { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-val.c { color: var(--safe); }
  .stat-val.nc { color: var(--danger); }
  .stat-val.obs { color: var(--warn); }
  .stat-val.na { color: var(--na); }

  .category-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .cat-item:hover { background: var(--bg3); }
  .cat-item.active { background: var(--bg3); border-color: var(--border); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { font-size: 12px; font-weight: 500; flex: 1; line-height: 1.3; }
  .cat-count { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .cat-score { font-size: 11px; font-family: 'DM Mono', monospace; }

  /* ── MAIN ── */
  main {
    overflow-y: auto;
    padding: 24px 32px;
    max-width: 1200px;
  }

  /* TABS */
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab {
    padding: 10px 18px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--fire); border-bottom-color: var(--fire); }

  /* AUDIT INFO */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .info-field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .info-field input, .info-field select, .info-field textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .info-field input:focus, .info-field select:focus, .info-field textarea:focus {
    border-color: var(--fire);
  }
  .info-field select option { background: var(--bg3); }
  .info-field.full { grid-column: 1/-1; }
  .info-field.half { grid-column: span 2; }

  /* CATEGORY SECTION */
  .cat-section { margin-bottom: 32px; }
  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding: 14px 16px;
    background: var(--bg3);
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .cat-header-icon { font-size: 20px; }
  .cat-header-info { flex: 1; }
  .cat-header-title { font-weight: 600; font-size: 15px; }
  .cat-header-ref { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .cat-header-stats { display: flex; gap: 12px; align-items: center; }
  .cat-progress-bar { width: 100px; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .cat-progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .cat-pct { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-dim); }
  .chevron { font-size: 14px; color: var(--text-muted); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* CHECKLIST TABLE */
  .checklist-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  .checklist-table th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .checklist-table th:first-child { border-radius: 8px 0 0 0; }
  .checklist-table th:last-child { border-radius: 0 8px 0 0; }
  .checklist-table td {
    padding: 12px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    font-size: 13px;
  }
  .checklist-table tr:last-child td { border-bottom: none; }
  .checklist-table tr { background: var(--bg2); transition: background 0.1s; }
  .checklist-table tr:hover td { background: var(--bg3); }
  .checklist-table tr.nc-row td { background: rgba(255,59,0,0.04); }
  .clause-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .clause-desc { line-height: 1.5; color: var(--text); }
  .clause-ref { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-family: 'DM Mono', monospace; }

  /* STATUS BUTTONS */
  .status-group { display: flex; gap: 4px; }
  .status-btn {
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    background: transparent;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .status-btn:hover { border-color: var(--border-bright); color: var(--text); }
  .status-btn.sel-C { background: rgba(0,196,140,0.15); border-color: var(--safe); color: var(--safe); }
  .status-btn.sel-NC { background: rgba(255,59,0,0.15); border-color: var(--danger); color: var(--danger); }
  .status-btn.sel-OBS { background: rgba(255,183,0,0.15); border-color: var(--warn); color: var(--warn); }
  .status-btn.sel-NA { background: rgba(107,114,128,0.15); border-color: var(--na); color: var(--na); }

  /* REMARKS */
  .remarks-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    resize: none;
    outline: none;
    min-width: 180px;
    transition: border-color 0.15s;
  }
  .remarks-input:focus { border-color: var(--fire); }

  /* SEVERITY BADGE */
  .sev-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .sev-H { background: rgba(255,59,0,0.2); color: #FF6B4A; }
  .sev-M { background: rgba(255,183,0,0.2); color: #FFB700; }
  .sev-L { background: rgba(0,196,140,0.15); color: #00C48C; }

  /* NC REPORT */
  .nc-report-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .report-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .report-card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .nc-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .nc-stat-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .nc-stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .nc-stat-lbl { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .nc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .nc-table th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .nc-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .nc-table tr:last-child td { border-bottom: none; }
  .nc-table tr { background: var(--bg2); }
  .nc-table tr:hover td { background: var(--bg3); }
  .no-nc {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .no-nc-icon { font-size: 40px; margin-bottom: 12px; }

  /* ALERTS SECTION */
  .alert-bar {
    background: rgba(255,59,0,0.1);
    border: 1px solid rgba(255,59,0,0.25);
    border-radius: 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .alert-bar .alert-icon { font-size: 16px; }
  .alert-bar strong { color: var(--fire); }

  /* PRINT */
  .print-btn {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .print-btn:hover { border-color: var(--border-bright); }

  /* SECTION DIVIDER */
  .section-divider {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 0 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* PAGE VIEWS */
  .page { display: none; }
  .page.active { display: block; }

  /* REPORT BUTTONS */
  .report-actions { display: flex; gap: 8px; margin-bottom: 24px; }

  /* OVERVIEW CARDS */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .ov-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .ov-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .ov-card.c::before { background: var(--safe); }
  .ov-card.nc::before { background: var(--danger); }
  .ov-card.obs::before { background: var(--warn); }
  .ov-card.total::before { background: var(--fire); }
  .ov-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; }
  .ov-num.c { color: var(--safe); }
  .ov-num.nc { color: var(--danger); }
  .ov-num.obs { color: var(--warn); }
  .ov-num.total { color: var(--fire); }
  .ov-lbl { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-top: 4px; }
  .ov-pct { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  /* CAT BARS */
  .cat-bars { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 24px; }
  .cat-bar-row { display: grid; grid-template-columns: 160px 1fr 80px; gap: 12px; align-items: center; margin-bottom: 14px; }
  .cat-bar-row:last-child { margin-bottom: 0; }
  .cat-bar-name { font-size: 12px; font-weight: 500; text-align: right; color: var(--text-dim); }
  .cat-bar-track { height: 10px; background: var(--bg2); border-radius: 5px; overflow: hidden; position: relative; }
  .cat-bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); display: flex; }
  .bar-c { background: var(--safe); }
  .bar-nc { background: var(--danger); }
  .bar-obs { background: var(--warn); }
  .cat-bar-pct { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text-dim); text-align: right; }

  /* Accordion */
  .acc-body { overflow: hidden; transition: max-height 0.3s ease; }
  .acc-body.closed { max-height: 0; }
  .acc-body.open { max-height: 9999px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  /* Print styles */
  @media print {
    header, aside, .tabs, .report-actions, .status-btn, .remarks-input, .nav-btn, .btn-primary, .btn-secondary { display: none !important; }
    .app-layout { display: block; }
    main { padding: 0; }
    body { background: white; color: black; }
    .nc-table, .nc-table td, .nc-table th { border-color: #ccc; color: black; }
    .report-card { border-color: #ccc; background: #f9f9f9; }
    .page { display: block !important; }
  }

  @media (max-width: 900px) {
    .app-layout { grid-template-columns: 1fr; }
    aside { display: none; }
    .info-grid { grid-template-columns: 1fr 1fr; }
    .overview-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔥</div>
    <div>
      <div class="logo-text">FIRESAFE AUDIT</div>
      <div class="logo-sub">NBC 2016 · IS Standards</div>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="showPage('audit')">Checklist</button>
    <button class="nav-btn" onclick="showPage('nc')">NC Report</button>
    <button class="nav-btn" onclick="showPage('summary')">Summary</button>
    <button class="btn-primary" onclick="generateNCReport()">⬇ Export NC Report</button>
  </nav>
</header>

<div class="app-layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">Audit Score</div>
      <div class="progress-ring-wrap">
        <div class="score-circle">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="30" fill="none" stroke="#1E2229" stroke-width="7"/>
            <circle id="scoreArc" cx="36" cy="36" r="30" fill="none" stroke="#FF3B00" stroke-width="7"
              stroke-dasharray="188.5" stroke-dashoffset="188.5" stroke-linecap="round"/>
          </svg>
          <div class="score-label">
            <span id="scorePct">0</span><span style="font-size:12px">%</span>
            <div class="score-sub">SCORE</div>
          </div>
        </div>
        <div class="score-stats">
          <div class="stat-row"><span class="stat-label">Compliant</span><span class="stat-val c" id="sb-c">0</span></div>
          <div class="stat-row"><span class="stat-label">Non-Conform</span><span class="stat-val nc" id="sb-nc">0</span></div>
          <div class="stat-row"><span class="stat-label">Observation</span><span class="stat-val obs" id="sb-obs">0</span></div>
          <div class="stat-row"><span class="stat-label">Not Applicable</span><span class="stat-val na" id="sb-na">0</span></div>
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Categories</div>
      <div class="category-list" id="catList"></div>
    </div>
  </aside>

  <main>
    <!-- ══ AUDIT PAGE ══ -->
    <div class="page active" id="page-audit">

      <div class="section-divider">Audit Information</div>
      <div class="info-grid">
        <div class="info-field">
          <label>Facility Name</label>
          <input type="text" id="facilityName" placeholder="e.g. ABC Industrial Complex">
        </div>
        <div class="info-field">
          <label>Audit Date</label>
          <input type="date" id="auditDate">
        </div>
        <div class="info-field">
          <label>Auditor Name</label>
          <input type="text" id="auditorName" placeholder="Lead Auditor">
        </div>
        <div class="info-field">
          <label>Building / Zone</label>
          <input type="text" id="buildingZone" placeholder="e.g. Block A, Floor 3">
        </div>
        <div class="info-field">
          <label>Occupancy Type (NBC)</label>
          <select id="occupancyType">
            <option value="">Select...</option>
            <option>Group A — Residential</option>
            <option>Group B — Educational</option>
            <option>Group C — Institutional</option>
            <option>Group D — Assembly</option>
            <option>Group E — Business</option>
            <option>Group F — Mercantile</option>
            <option>Group G — Industrial</option>
            <option>Group H — Storage</option>

function setStatus(id, val) {
  state[id].status = val;
  // Update row highlight
  const row = document.getElementById(`row-${id}`);
  row.classList.toggle('nc-row', val === 'NC');
  // Update buttons
  const btns = document.querySelectorAll(`[data-id="${id}"]`);
  btns.forEach(b => {
    b.className = 'status-btn';
    if (b.dataset.val === val) b.classList.add(`sel-${val}`);
  });
  updateScores();
}

function setRemarks(id, val) {
  state[id].remarks = val;
}

// ═══════════════════════════════════════════════════════════
//  SCORE CALCULATION
// ═══════════════════════════════════════════════════════════
function calcScores() {
  let total=0, C=0, NC=0, OBS=0, NA=0;
  const catScores = {};
  CATEGORIES.forEach(cat => {
    let cc=0,cn=0,co=0,cna=0;
    cat.items.forEach(item => {
      const s = state[item.id].status;
      total++;
      if (s==='C')   { C++;   cc++; }
      else if (s==='NC')  { NC++;  cn++; }
      else if (s==='OBS') { OBS++; co++; }
      else if (s==='NA')  { NA++;  cna++; }
    });
    catScores[cat.id] = { C:cc, NC:cn, OBS:co, NA:cna, total:cat.items.length };
  });
  const answered = C + NC + OBS;
  const pct = answered > 0 ? Math.round((C / answered) * 100) : 0;
  return { total, C, NC, OBS, NA, pct, catScores };
}

function updateScores() {
  const s = calcScores();
  // Sidebar
  document.getElementById('sb-c').textContent = s.C;
  document.getElementById('sb-nc').textContent = s.NC;
  document.getElementById('sb-obs').textContent = s.OBS;
  document.getElementById('sb-na').textContent = s.NA;
  document.getElementById('scorePct').textContent = s.pct;
  // Arc
  const circ = 2 * Math.PI * 30;
  const offset = circ - (s.pct / 100) * circ;
  const arc = document.getElementById('scoreArc');
  arc.setAttribute('stroke-dashoffset', offset);
  const col = s.pct >= 80 ? '#00C48C' : s.pct >= 50 ? '#FFB700' : '#FF3B00';
  arc.setAttribute('stroke', col);
  // Category progress
  CATEGORIES.forEach(cat => {
    const cs = s.catScores[cat.id];
    const answered = cs.C + cs.NC + cs.OBS;
    const pct = answered > 0 ? Math.round((cs.C / answered) * 100) : 0;
    const prog = document.getElementById(`catprog-${cat.id}`);
    const pctEl = document.getElementById(`catpct-${cat.id}`);
    if (prog) prog.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
  });
  renderSidebar();
}

function renderSidebar() {
  const s = calcScores();
  const list = document.getElementById('catList');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const cs = s.catScores[cat.id];
    const answered = cs.C + cs.NC + cs.OBS;
    const pct = answered > 0 ? Math.round((cs.C / answered) * 100) : 0;
    const div = document.createElement('div');
    div.className = 'cat-item';
    div.innerHTML = `
      <div class="cat-dot" style="background:${cat.color}"></div>
      <div class="cat-name">${cat.name}</div>
      <span class="cat-count">${answered}/${cs.total}</span>
      <span class="cat-score" style="color:${pct>=80?'var(--safe)':pct>=50?'var(--warn)':'var(--danger)'}">${answered>0?pct+'%':'-'}</span>
    `;
    div.onclick = () => {
      document.getElementById(`cat-${cat.id}`)?.scrollIntoView({ behavior:'smooth', block:'start' });
      showPage('audit');
    };
    list.appendChild(div);
  });
}

    const cs = s.catScores[cat.id];
    const answered = cs.C + cs.NC + cs.OBS;
    const pct = answered > 0 ? Math.round((cs.C / answered) * 100) : 0;
    const ncPct = answered > 0 ? Math.round((cs.NC / answered) * 100) : 0;
    const obsPct = answered > 0 ? Math.round((cs.OBS / answered) * 100) : 0;
    html += `
      <div class="cat-bar-row">
        <div class="cat-bar-name">${cat.icon} ${cat.name}</div>
        <div class="cat-bar-track">
          <div class="cat-bar-fill">
            <div class="bar-c" style="width:${pct}%"></div>
            <div class="bar-obs" style="width:${obsPct}%"></div>
            <div class="bar-nc" style="width:${ncPct}%"></div>
          </div>
        </div>
        <div class="cat-bar-pct" style="color:${pct>=80?'var(--safe)':pct>=50?'var(--warn)':'var(--danger)'}">${answered>0?pct+'%':'—'}</div>
      </div>
    `;
  });

  html += `</div>`;

  // Unanswered
  let unanswered = 0;
  CATEGORIES.forEach(cat => { cat.items.forEach(item => { if (!state[item.id].status) unanswered++; }); });
  if (unanswered > 0) {
    html += `<div class="alert-bar" style="background:rgba(255,183,0,0.08); border-color:rgba(255,183,0,0.2)"><span class="alert-icon">⚠️</span><strong>${unanswered} clause${unanswered>1?'s':''} not yet assessed.</strong> Complete the audit checklist for accurate scoring.</div>`;
  }

  document.getElementById('summaryContent').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  CSV EXPORT
// ═══════════════════════════════════════════════════════════
function exportCSV() {
  const rows = [['NC#','Category','Clause','Description','IS Reference','Severity','Status','Remarks']];
  let nc = 0;
  CATEGORIES.forEach(cat => {
    cat.items.forEach(item => {
      const st = state[item.id];
      if (st.status === 'NC' || st.status === 'OBS') {
        if (st.status === 'NC') nc++;
        rows.push([nc||'OBS', cat.name, item.code, `"${item.desc.replace(/"/g,'""')}"`, item.ref, item.sev==='H'?'High':item.sev==='M'?'Medium':'Low', st.status, `"${(st.remarks||'').replace(/"/g,'""')}"`]);
      }
    });
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fire_safety_nc_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════════════════
//  PAGE NAVIGATION
// ═══════════════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { audit: 0, nc: 1, summary: 2 };
  document.querySelectorAll('.nav-btn')[map[name]]?.classList.add('active');
  if (name === 'summary') renderSummaryPage();
  if (name === 'nc') generateNCReport();
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
document.getElementById('auditDate').valueAsDate = new Date();
renderChecklist();
updateScores();
</script>
